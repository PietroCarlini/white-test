    <div class="form wrapper">
        <h2>Contact Hicks Thomas LLP</h2>
        <h4>- Learn About Our Innovative Legal Solustions -</h4>
        <form action="">
            <div class="form__group form__half__group">
                <div class="form__field first-name">
                    <input type="text" id="first-name" name="first-name" placeholder="First Name" required>
                </div>
                <div class="form__field last-name">
                <input type="text" id="last-name" name="last-name" placeholder="Last Name" required>
                </div>
            </div>
            <div class="form__group">
                <div class="form__field e-mail">
                    <input type="text" id="e-mail" name="e-mail" placeholder="E-mail" required>
                </div>
                <div class="form__field phone">
                    <input type="text" id="phone" name="phone" placeholder="Phone" required>
                </div>
                <div class="form__field selection">
                <select name="client-type" id="client-type">
                    <option value="New">Yes,I'm new</option>
                    <option value="Exisiting">Nope, you know me already</option>
                    <option value="Either">Not yet take chosen</option>
                </select>
                </div>
                <div class="form__field message">
                <input type="text" id="message" name="message" placeholder="Message" required>
                </div>
            </div>
    </div>
